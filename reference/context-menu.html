<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Context menu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* Design tokens from Figma variables */
    :root {
      --bg-component: #27272a;
      --fg-subtle: #52525b;
      --fg-error: #fb7185;
      --border-menu-top: #212124;
      --rounded-sm: 4px;
      --rounded-md: 6px;
      --font-ui: Inter, -apple-system, sans-serif;
      --text-sm-size: 13px;
      --text-sm-leading: 16px;
      --font-weight-medium: 500;
      /* Flyout elevation: 0 8px 16px #00000052, 0 4px 8px #00000052, 0 0 0 1px #FFFFFF1A, 0 -1px 0 #FFFFFF0A */
      --shadow-flyout: 0 8px 16px rgba(0, 0, 0, 0.32), 0 4px 8px rgba(0, 0, 0, 0.32), 0 0 0 1px rgba(255, 255, 255, 0.1), 0 -1px 0 0 rgba(255, 255, 255, 0.04);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font-ui);
      background: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .context-menu {
      width: 160px;
      background: var(--bg-component);
      border-radius: var(--rounded-md);
      box-shadow: var(--shadow-flyout);
      padding: var(--rounded-sm) 0;
    }
    .context-menu-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      font-family: var(--font-ui);
      font-size: var(--text-sm-size);
      line-height: var(--text-sm-leading);
      font-weight: var(--font-weight-medium);
      color: #fafafa;
      cursor: pointer;
      border: none;
      width: 100%;
      text-align: left;
      background: none;
      transition: background 0.15s;
    }
    .context-menu-item:hover {
      background: rgba(255, 255, 255, 0.06);
    }
    .context-menu-item .icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: inherit;
    }
    .context-menu-item .icon svg { width: 100%; height: 100%; }
    .context-menu-item.destructive {
      color: var(--fg-error);
    }
  </style>
</head>
<body>
  <div class="context-menu" role="menu">
    <button type="button" class="context-menu-item" role="menuitem">
      <span class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
      </span>
      Edit
    </button>
    <button type="button" class="context-menu-item" role="menuitem">
      <span class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
      </span>
      Duplicate
    </button>
    <button type="button" class="context-menu-item destructive" role="menuitem">
      <span class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
          <line x1="10" y1="11" x2="10" y2="17"/>
          <line x1="14" y1="11" x2="14" y2="17"/>
        </svg>
      </span>
      Delete
    </button>
  </div>
</body>
</html>
