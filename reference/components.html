<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Figma components</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, -apple-system, sans-serif;
      background: #fafafa;
      color: #18181b;
      padding: 2rem;
      padding-bottom: 4rem;
    }
    .page-title {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    .page-desc {
      font-size: 0.875rem;
      color: #71717a;
      margin-bottom: 2rem;
    }
    .component-block {
      margin-bottom: 3rem;
    }
    .component-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #71717a;
      margin-bottom: 0.75rem;
      padding-bottom: 0.25rem;
      border-bottom: 1px solid #e4e4e7;
    }
    .component-wrap {
      display: inline-block;
      background: #f5f5f5;
      padding: 1.5rem;
      border-radius: 8px;
      border: 1px solid #e4e4e7;
    }
    .component-wrap.dark-bg { background: #1a1a1a; padding: 1.5rem; }

    /* ----- Context menu (shared) ----- */
    .context-menu {
      width: 160px; border-radius: 6px; padding: 4px 0;
      font-family: Inter, -apple-system, sans-serif; font-size: 13px; line-height: 16px; font-weight: 500;
    }
    .context-menu-item { display: flex; align-items: center; gap: 8px; padding: 8px 12px; color: inherit; cursor: pointer; border: none; width: 100%; text-align: left; background: none; font-family: inherit; font-size: inherit; line-height: inherit; font-weight: inherit; transition: background 0.15s; }
    .context-menu-item:hover { background: rgba(255,255,255,0.06); }
    .context-menu-item .icon { width: 16px; height: 16px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: inherit; }
    .context-menu-item .icon svg { width: 100%; height: 100%; }
    .context-menu-separator { height: 1px; margin: 4px 0; }
    /* Dark context menu */
    #context-menu-dark .component-wrap { background: #1a1a1a; }
    #context-menu-dark .context-menu { background: #27272a; color: #fafafa; box-shadow: 0 8px 16px rgba(0,0,0,0.32), 0 4px 8px rgba(0,0,0,0.32), 0 0 0 1px rgba(255,255,255,0.1), 0 -1px 0 0 rgba(255,255,255,0.04); }
    #context-menu-dark .context-menu-item.destructive { color: #fb7185; }
    #context-menu-dark .context-menu-item:hover { background: rgba(255,255,255,0.06); }
    /* Light context menu */
    #context-menu-light .context-menu { background: #ffffff; color: #18181b; box-shadow: 0 8px 16px rgba(0,0,0,0.08), 0 4px 8px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,0,0,0.08); }
    #context-menu-light .context-menu-item .icon { color: #52525b; }
    #context-menu-light .context-menu-item.destructive { color: #e11d48; }
    #context-menu-light .context-menu-item.destructive .icon { color: #e11d48; }
    #context-menu-light .context-menu-item:hover { background: #f4f4f5; }
    #context-menu-light .context-menu-separator { background: #e4e4e7; }
  </style>
</head>
<body>
  <h1 class="page-title">Figma components</h1>
  <p class="page-desc">All components from Figma, each with a label. New components get added here when you ask to “make what I have selected.”</p>

  <!-- 0. Inbox (Sentra Quality) -->
  <section class="component-block" id="sentra-inbox">
    <div class="component-label">Inbox (Sentra Quality) – Figma node 1321-9150</div>
    <div class="component-wrap" style="padding: 0; overflow: auto; max-width: 100%;">
      <iframe src="sentra-inbox.html" title="Inbox Sentra Quality" style="width: 900px; height: 540px; border: none; display: block;"></iframe>
    </div>
  </section>

  <!-- 1. Context menu (dark) -->
  <section class="component-block" id="context-menu-dark">
    <div class="component-label">Context menu (dark)</div>
    <div class="component-wrap dark-bg">
      <div class="context-menu" role="menu">
        <button type="button" class="context-menu-item" role="menuitem"><span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></span> Edit</button>
        <button type="button" class="context-menu-item" role="menuitem"><span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></span> Duplicate</button>
        <button type="button" class="context-menu-item destructive" role="menuitem"><span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg></span> Delete</button>
      </div>
    </div>
  </section>

  <!-- 2. Context menu (light) -->
  <section class="component-block" id="context-menu-light">
    <div class="component-label">Context menu (light)</div>
    <div class="component-wrap">
      <div class="context-menu" role="menu">
        <button type="button" class="context-menu-item" role="menuitem"><span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></span> Edit</button>
        <button type="button" class="context-menu-item" role="menuitem"><span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></span> Duplicate</button>
        <div class="context-menu-separator" role="separator" aria-hidden="true"></div>
        <button type="button" class="context-menu-item destructive" role="menuitem"><span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg></span> Delete</button>
      </div>
    </div>
  </section>

</body>
</html>
